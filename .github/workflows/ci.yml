name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 20

      - name: Detect CLI changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          base: main
          filters: |
            cli:
              - "apps/cli/**"
              - "packages/agent-adapters/**"
              - "packages/api-routes/**"
              - "packages/typescript-config/**"
              - "package.json"
              - "bun.lock"
              - ".github/actions/setup/**"
              - ".github/workflows/ci.yml"

  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: ./.github/actions/setup

      - name: Check for local overrides
        run: bun scripts/check-overrides.ts

      - name: Verify
        run: bun run turbo run lint check-types test build

  integration:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: rudel
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready --username postgres --dbname rudel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      PG_CONNECTION_STRING: postgres://postgres:postgres@localhost:5432/rudel
      CLICKHOUSE_URL: http://localhost:8123
      CLICKHOUSE_USER: rudel
      CLICKHOUSE_USERNAME: rudel
      CLICKHOUSE_PASSWORD: rudel-ci
      CLICKHOUSE_DB: default
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: ./.github/actions/setup

      - name: Start ClickHouse
        run: |
          docker run --detach \
            --name rudel-ci-clickhouse \
            --publish 8123:8123 \
            --env CLICKHOUSE_DB=default \
            --env CLICKHOUSE_USER=rudel \
            --env CLICKHOUSE_PASSWORD=rudel-ci \
            --env CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1 \
            --volume "${GITHUB_WORKSPACE}/.github/clickhouse/config.d/storage-policy.xml:/etc/clickhouse-server/config.d/storage-policy.xml:ro" \
            clickhouse/clickhouse-server:26.3.17.56

      - name: Wait for ClickHouse
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --user rudel:rudel-ci http://localhost:8123/ping | grep --quiet Ok; then
              exit 0
            fi
            sleep 1
          done
          docker logs rudel-ci-clickhouse
          exit 1

      - name: Run Postgres migrations
        run: bun run --cwd packages/sql-schema migrate

      - name: Run ClickHouse migrations
        working-directory: packages/ch-schema
        run: bun --bun chkit migrate --apply --allow-destructive

      - name: Run integration tests
        run: bun run turbo run test:integration

  cli-smoke:
    if: needs.changes.outputs.cli == 'true'
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup Bun
        uses: ./.github/actions/setup

      - name: Pack and run the installed CLI
        shell: bash
        run: |
          rm -rf .tmp/cli-smoke
          mkdir -p .tmp/cli-smoke/package
          npm pack ./apps/cli --pack-destination .tmp/cli-smoke/package
          npm install \
            --prefix .tmp/cli-smoke/install \
            --ignore-scripts \
            --no-audit \
            --no-fund \
            .tmp/cli-smoke/package/rudel-*.tgz
          node .tmp/cli-smoke/install/node_modules/rudel/dist/cli.js --help

  cli-smoke-required:
    if: always()
    needs:
      - changes
      - cli-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require successful CLI smoke tests when applicable
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          CLI_CHANGED: ${{ needs.changes.outputs.cli }}
          CLI_SMOKE_RESULT: ${{ needs.cli-smoke.result }}
        run: |
          if [[ "${CHANGES_RESULT}" != "success" ]]; then
            echo "CLI change detection failed."
            exit 1
          fi

          if [[ "${CLI_CHANGED}" == "true" && "${CLI_SMOKE_RESULT}" != "success" ]]; then
            echo "CLI smoke tests did not succeed: ${CLI_SMOKE_RESULT}"
            exit 1
          fi

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [verify, integration]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: ./.github/actions/setup

      - name: Run Postgres migrations
        run: bun run --cwd packages/sql-schema migrate
        env:
          PG_CONNECTION_STRING: ${{ secrets.PG_CONNECTION_STRING }}

      - name: Setup Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6

      - name: Deploy
        run: |
          flyctl deploy --remote-only \
            --build-arg "VITE_CHATWOOT_BASE_URL=${{ secrets.VITE_CHATWOOT_BASE_URL }}" \
            --build-arg "VITE_CHATWOOT_WEBSITE_TOKEN=${{ secrets.VITE_CHATWOOT_WEBSITE_TOKEN }}" \
            --build-arg "VITE_POSTHOG_KEY=${{ secrets.VITE_POSTHOG_KEY }}" \
            --build-arg "VITE_POSTHOG_HOST=${{ secrets.VITE_POSTHOG_HOST }}" \
            --build-arg "VITE_POSTHOG_ENABLED=${{ secrets.VITE_POSTHOG_ENABLED }}" \
            --build-arg "VITE_ADMIN_ORGANIZATION_ID=${{ secrets.VITE_ADMIN_ORGANIZATION_ID }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
