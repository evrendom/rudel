app = "rudel"
primary_region = "fra"

[build]

[deploy]
  release_command = "bun run --cwd apps/api backfill:session-ownership"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    port = 3000
    type = "http"
    interval = "10s"
    timeout = "2s"
    path = "/health"
